name: Build and publish Pages branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deployed-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Build site with Jekyll
        run: |
          if [ -f Gemfile ]; then
            bundle exec jekyll build --destination public
          else
            gem install jekyll webrick --no-document
            jekyll build --destination public
          fi

      - name: Write deploy metadata
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DEPLOYED_AT="$(date -u +'%Y-%m-%d %H:%M:%SZ')"
          COMMIT_URL="https://github.com/${REPOSITORY}/commit/${COMMIT_SHA}"
          cat > public/deploy-meta.json <<EOF
          {
            "deployed_at": "${DEPLOYED_AT}",
            "commit": "${COMMIT_SHA}",
            "commit_short": "${SHORT_SHA}",
            "commit_url": "${COMMIT_URL}"
          }
          EOF

      - name: Publish public/ to deployed-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: deployed-pages
          force_orphan: true
