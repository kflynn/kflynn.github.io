name: Build and deploy Pages site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Build site with Jekyll
        run: |
          if [ -f Gemfile ]; then
            bundle exec jekyll build --destination public
          else
            gem install jekyll webrick --no-document
            jekyll build --destination public
          fi

      - name: Write deploy metadata
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DEPLOYED_AT="$(date -u +'%Y-%m-%d %H:%M:%SZ')"
          COMMIT_URL="https://github.com/${REPOSITORY}/commit/${COMMIT_SHA}"
          cat > public/deploy-meta.json <<EOF
          {
            "deployed_at": "${DEPLOYED_AT}",
            "commit": "${COMMIT_SHA}",
            "commit_short": "${SHORT_SHA}",
            "commit_url": "${COMMIT_URL}"
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
