<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>kodachi 6&bull;14, llc</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      font-family: sans-serif;
    }

    .page-content {
      flex: 1;
    }

    .deploy-footer {
      margin-top: 2rem;
      padding-top: 0.75rem;
      border-top: 1px solid #ccc;
      font-size: 0.9rem;
      color: #444;
    }

    .deploy-footer a {
      color: inherit;
    }
  </style>
</head>

<body>
  <main class="page-content">
    <h2>kodachi 6&bull;14, llc</h2>

    <p>
      If you're hunting for anything useful, your best bet is to
      <a href="mailto:flynn+www@kodachi.com">email Flynn</a>.
    </p>

    <p>
      You might also find it of possible historical interest to see
      some <a href="COVID/">COVID-19 graphs</a> which, at the moment,
      are not being updated.
    </p>
  </main>

  <footer class="deploy-footer" aria-live="polite">
    Last deploy: <span id="deploy-date">loading...</span>
    (<a id="deploy-commit-link" href="#">commit <span id="deploy-commit">loading...</span></a>)
  </footer>

  <script>
    (function () {
      var dateEl = document.getElementById('deploy-date');
      var commitEl = document.getElementById('deploy-commit');
      var commitLinkEl = document.getElementById('deploy-commit-link');

      function formatDisplayDate(value) {
        var parsed = new Date(value);
        if (isNaN(parsed.getTime())) {
          return null;
        }
        return parsed.toISOString().replace('T', ' ').replace('.000Z', 'Z');
      }

      function setFallback() {
        var localDate = formatDisplayDate(document.lastModified) || formatDisplayDate(new Date()) || 'not deployed yet';
        dateEl.textContent = localDate;
        commitEl.textContent = 'local-dev';
        commitLinkEl.removeAttribute('href');
      }

      fetch('/deploy-meta.json', { cache: 'no-store' })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('missing deploy metadata');
          }
          return response.json();
        })
        .then(function (meta) {
          var deployedAt = formatDisplayDate(meta.deployed_at) || formatDisplayDate(new Date()) || 'not deployed yet';
          var shortSha = meta.commit_short || 'local-dev';
          var commitUrl = meta.commit_url || '';

          dateEl.textContent = deployedAt;
          commitEl.textContent = shortSha;

          if (commitUrl) {
            commitLinkEl.href = commitUrl;
          } else {
            commitLinkEl.removeAttribute('href');
          }
        })
        .catch(function () {
          setFallback();
        });
    })();
  </script>
</body>

</html>
